name: CodeQL

# Static analysis for the Go source code itself. Catches code-level
# vulns (SQL injection, command injection, SSRF, path traversal,
# integer overflow, race conditions, etc.) BEFORE they get tagged
# for go-modules consumption.
#
# Free for public repos; runs daily + on every PR.
#
# Findings appear in the Security tab (Code scanning alerts).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '47 4 * * *'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL — Go
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['go']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform analysis
        uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
        with:
          category: '/language:${{ matrix.language }}'
