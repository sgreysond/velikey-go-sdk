run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - examples

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - typecheck
  disable:
    - gosimple
    - unused
    - structcheck
    - deadcode

linters-settings:
  gofmt:
    simplify: true
  govet:
    check-shadowing: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - ineffassign
